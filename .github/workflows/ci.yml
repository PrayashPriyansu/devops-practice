name: ci

on:
    push:
        branches: ["main"]

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: maven

            - run: mvn -B test
